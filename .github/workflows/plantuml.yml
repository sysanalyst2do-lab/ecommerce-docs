name: Generate PlantUML diagrams

on:
  push:
    paths:
      - 'docs/architecture/c4/**/*.puml'
  workflow_dispatch: {}

jobs:
  render-plantuml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download PlantUML jar
        run: |
          curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Generate PNG diagrams from .puml
        run: |
          find docs/architecture/c4 -name "*.puml" -print0 | while IFS= read -r -d '' file; do
            echo "Rendering $file"
            java -jar plantuml.jar -tpng "$file"
          done

      - name: Commit and push generated diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(plantuml): update generated diagrams"
          file_pattern: "docs/architecture/c4/*.png"
